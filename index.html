    // ★ 結合星座專屬賀詞的 LINE 文案生成器 ★
    function generateLINEBlessing(person) {
        let m = parseInt(person.birthday.split('月'));
        let zInfo = getZodiacInfo(person.birthday);
        let hook = getHistoricalHook(m);
        let respectTitle = person.title || "長官/學長姐"; 
        
        let msg = `親愛的 ${person.name} ${respectTitle} 您好：\n\n今天是 ${person.birthday}，屬於${zInfo.name}的特別日子！🎂\n\n${hook}\n但對我來說，今天最重要的大事，就是慶祝您的誕生！🎉\n\n非常欣賞您「${zInfo.trait}」！\n\n${zInfo.wish} 🥂\n\n若未來有任何財務或人生藍圖上的規劃，我隨時為您安排最頂級的服務。\n\n再次祝您 生日快樂、平安健康！🎊🎁`;
        return msg;
    }

    function copyToClipboard(textId) {
        let textToCopy = document.getElementById(textId).innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            let toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        });
    }

    function createPersonCardHTML(person, isBirthdayPage = false, index = 0) {

                    <div class="line-text" id="${textId}">${blessingText}</div>

                </div>
            `;
        } else {
            let title = person.title || "";
            let suggestion = "";
            if (title.includes("董事長") || title.includes("總經理") || title.includes("負責人") || title.includes("老板") || title.includes("執行長") || title.includes("創辦人") || title.includes("代表人") || title.includes("副總召")) {
                suggestion = "身為企業領航者，我深知您的重擔。我的角色不只是提供<b>法人金融</b>與<b>公司金流優化</b>，更是守護您畢生心血的夥伴。透過量身打造的<b>家族信託與資產傳承規劃</b>，協助您無後顧之憂。";
            } else if (title.includes("副總") || title.includes("處長") || title.includes("協理") || title.includes("總監") || title.includes("經理") || title.includes("副理") || title.includes("主管") || title.includes("財務長") || title.includes("Leader") || title.includes("lead") || title.includes("Manager")) {
                suggestion = "對於您這樣的高階決策者，時間是最寶貴的資產。我能為您提供專屬的<b>高階私人財富管理</b>，包含客製化<b>節稅建議與尊榮菁英房貸專案</b>，讓您的個人資產穩健增值。";
            } else if (title.includes("法務") || title.includes("資訊") || title.includes("研發") || title.includes("稽核") || title.includes("建築師") || title.includes("記者") || title.includes("IT") || title.includes("企劃") || title.includes("教職")) {
                suggestion = "您的職業需要高度專業與專注。理財請放心交給我。我將為您規劃穩健的<b>被動收入配置、優利定存及專屬信貸方案</b>，幫您建構安心的財務防護網。";
            } else {
                suggestion = "面對瞬息萬變的市場，您需要靈活的財務支援。無論是<b>購屋換車的優惠貸款</b>，或是<b>彈性資金存款配置</b>，我都會為您爭取最優條件，成為實現夢想的最佳後盾。";
            }
            let warmTip = `✨ <b>溫馨提示：</b> 生日(${person.birthday})即將到來，別忘了獻上專屬祝福。`;
            if (person.diet && person.diet !== "無") {
                warmTip += `<br>🍽️ <b>邀約細節：</b> 客戶有「<span style="color:#ff6b6b;">${person.diet}</span>」習慣，請提前預訂專屬餐廳。`;
            }
            proposal = `
                <div class="proposal-box">
                    <div class="proposal-title">VIP 私人財富提案</div>
                    <p class="proposal-text">${suggestion}</p>
                    <div class="warm-tip">${warmTip}</div>
                </div>
            `;
        }

        return `
            <div class="card">
                <div class="card-header">
                    <div class="card-name">${person.name}</div>
                    <div class="card-group">第 ${person.group} 組</div>
                </div>
                
                <div class="tags-container">
                    ${isBirthdayPage ? `<span class="tag tag-birthday">🎂 ${person.birthday}</span>` : `<span class="tag">🎂 ${person.birthday}</span>`}

    }

    function searchNetwork() {
        let keyword = document.getElementById('keywordInput').value.trim();
        const container = document.getElementById('resultsContainer');
        container.innerHTML = ""; 
        if (keyword === "") { container.innerHTML = "<p style='text-align:center; color:#ff6b6b; font-weight:300;'>請輸入查詢關鍵字</p>"; return; }

        let searchGroupNum = null;
        const groupMapping = {
            "第一組": "1", "一組": "1", "第1組": "1", "1組": "1", "1": "1",
            "第二組": "2", "二組": "2", "第2組": "2", "2組": "2", "2": "2",
            "第三組": "3", "三組": "3", "第3組": "3", "3組": "3", "3": "3",
            "第四組": "4", "四組": "4", "第4組": "4", "4組": "4", "4": "4",
            "第五組": "5", "五組": "5", "第5組": "5", "5組": "5", "5": "5",
            "第六組": "6", "六組": "6", "第6組": "6", "6組": "6", "6": "6",
            "第七組": "7", "七組": "7", "第7組": "7", "7組": "7", "7": "7",
            "第八組": "8", "八組": "8", "第8組": "8", "8組": "8", "8": "8"
        };
        if (groupMapping[keyword]) searchGroupNum = groupMapping[keyword];

        const results = networkData.filter(person => 
            (searchGroupNum && person.group === searchGroupNum) || 
            (person.name && person.name.includes(keyword)) || 
            (person.birthday && person.birthday.includes(keyword)) || 
            (person.company && person.company.includes(keyword)) || 
            (person.title && person.title.includes(keyword)) ||
            (person.diet && person.diet.includes(keyword)) ||
            (person.family && person.family.includes(keyword))
        );

        if (results.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:#718096; font-weight:300;">查無資料，請嘗試其他關鍵字</p>`;
        } else {
            container.innerHTML = `<p style="font-size:14px; color:#a0aec0; margin-bottom:15px; font-weight:300; letter-spacing:1px;">為您精準匹配 <b>${results.length}</b> 位尊榮客戶：</p>`;
            results.forEach((person, idx) => { container.innerHTML += createPersonCardHTML(person, false, idx); });
            container.innerHTML += `<button class="home-btn" onclick="goToHome()">🏠 回首頁 / 重新搜尋</button>`;
        }
    }

    function loadCurrentMonthBirthdays() {
        const today = new Date();
        const currentMonthNum = today.getMonth() + 1;
        const currentMonthStr = String(currentMonthNum).padStart(2, '0') + '月';
        
        document.getElementById('birthdayTitle').innerText = `✧ ${currentMonthStr} 專屬壽星 ✧`;
        const container = document.getElementById('birthdayContainer');
        container.innerHTML = "";

        let monthBirthdays = networkData.filter(person => person.birthday && person.birthday.startsWith(currentMonthStr));

        monthBirthdays.sort((a, b) => {
            let dayA = parseInt(a.birthday.split('月').replace('日', ''));
            let dayB = parseInt(b.birthday.split('月').replace('日', ''));
            return dayA - dayB;
        });

        if (monthBirthdays.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:#778da9; font-weight:300;">本月份尚無壽星名單</p>`;
        } else {
            monthBirthdays.forEach((person, index) => {
                container.innerHTML += createPersonCardHTML(person, true, index);
            });
        }
    }
